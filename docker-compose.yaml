services:
  data-management-server:
    build: .
    image: data-management-server:latest
    container_name: data-management-server
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Shared directory: the DMS writes here; JupyterHub singleuser containers
      # get the relevant sub-directories bind-mounted read-only (datasets) or
      # read-write (notebooks).  The host path must match the value configured
      # in JupyterHub's pre_spawn_hook.
      - /home/energyguard/jupyterhub_data:/jupyterhub_data
    ports:
      # Bind to loopback so the service is reachable via SSH port forwarding
      # without exposing it publicly on the server network interface.
      - "6060:6060"
    networks:
      - nginxproxy_energyguard_net
    # Other containers can still reach it at http://data-management-server:6060

networks:
  nginxproxy_energyguard_net:
    external: true
    name: nginxproxy_energyguard_net
